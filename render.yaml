services:
  - type: web
    name: ghl-multi-vertical-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GHL_API_KEY
        sync: false
      - key: GHL_LOCATION_ID
        sync: false
      - key: ADMIN_API_KEY
        generateValue: true
      - key: ACTIVE_VERTICAL
        value: real_estate
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        fromService:
          type: redis
          name: ghl-bot-redis
          property: connectionString

  - type: redis
    name: ghl-bot-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
